<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Console</title>
  </head>

  <body>
    <h1>Cadastro de Console</h1>  

    <form action="scriptConsole" method="post" enctype="multipart/form-data">
      <fieldset>
        <legend>Dados do Console</legend>

        <p><label for="ano">ANO:</label><br>
          <input type="text" id="ano" name="ano" size="10" autofocus>
        </p>

        <p><label for="descricao">DESCRIÇÃO:</label><br>
          <input type="text" id="descricao" name="descricao" size="30">
        </p>

        <hr>

        <p><input type="submit" value="CADASTRAR"></p>
      </fieldset>
    </form>
  </body>
</html>
