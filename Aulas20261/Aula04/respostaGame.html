<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Games</title>
  </head>

  <body>
    <script>
      alert('Game cadastrado com sucesso!')
    </script>

    <h1>Cadastro de Game</h1>  

    <form action="http://localhost:3000" method="get">
      <fieldset>
        <legend>Dados do Game</legend>

        <p><label for="ano">ANO:</label><br>
          <input type="text" id="ano" name="ano" size="10" autofocus>
        </p>

        <p><label for="titulo">TÍTULO:</label><br>
          <input type="text" id="titulo" name="titulo" size="30">
        </p>

        <hr>

        <p><input type="submit" value="CADASTRAR"></p>
      </fieldset>
    </form>
  </body>
</html>
