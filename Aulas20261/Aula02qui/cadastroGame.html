<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Games</title>
  </head>

  <body>
    <h1>Cadastro de Game</h1>

    <form action="http://localhost:3000" method="get">
      <fieldset>
        <legend>DADOS DO GAME</legend>

        <p><label for="ano">ANO DE LANÇAMENTO:</label><br>
          <input type="text" size="15" id="ano" name="ano" autofocus>
        </p>

        <p><label for="titulo">TÍTULO:</label><br>
          <input type="text" size="30" id="titulo" name="titulo">
        </p>

        <p><input type="submit" value="CADASTRAR"></p>
      </fieldset>
    </form>

  </body>
</html>
